# Airflow local (mode standalone, 1 conteneur) pour le TP S17.
# Lancement : docker compose -f docker-compose.airflow.yml up -d
# UI : http://localhost:8080  (user: admin ; mot de passe dans les logs)
#   docker compose -f docker-compose.airflow.yml logs | grep -i "Password for user"

services:
  airflow:
    image: apache/airflow:2.10.4
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/src
      API_URL: http://host.docker.internal:8000
      _PIP_ADDITIONAL_REQUIREMENTS: "scikit-learn pandas numpy joblib python-dotenv httpx"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        exec airflow standalone
