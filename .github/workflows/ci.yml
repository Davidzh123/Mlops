name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Installation des dependances (projet + dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src scripts tests

      - name: Format (ruff)
        run: uv run ruff format --check src scripts tests

      - name: Types (mypy)
        run: uv run mypy src/mlproject

      - name: Tests (pytest)
        run: uv run pytest

  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Installation des dependances (projet + dev)
        run: uv sync --extra dev

      - name: Donnees (echantillon synthetique) + entrainement de la baseline
        run: |
          uv run python scripts/make_sample_data.py
          uv run python -m mlproject.train

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          if-no-files-found: error
