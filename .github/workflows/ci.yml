name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances (projet + dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/mlproject

      - name: Types (mypy)
        run: uv run mypy src/mlproject

      - name: Tests (pytest)
        run: uv run pytest

  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances
        run: uv sync

      - name: Donnees + entrainement de la baseline
        run: |
          uv run python scripts/make_sample_data.py
          uv run python -m mlproject.train

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
          if-no-files-found: error
