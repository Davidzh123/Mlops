name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src scripts

      - name: Format check (ruff)
        run: uv run ruff format --check src scripts

      - name: Import smoke test
        run: uv run python -c "import mlproject.config, mlproject.data, mlproject.features, mlproject.api, mlproject.train, mlproject.train_models, mlproject.train_optuna"
